<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Finance Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="centered-container">
    <div class="header">
    <h1>Finance Chatbot</h1>
<img src="{{ url_for('static', filename='chatbot-mascot.png') }}" class="floating-img" alt="Chatbot Mascot" />
</div>

    <div class="card">
        <form method="POST" style="margin-bottom: 20px;">
            <input type="text" name="user_input" placeholder="Type your question..." required autofocus>
            <button class="button" type="submit">Ask</button>
        </form>
        {% if chat_response %}
        <div class="chat-response">
            <strong>Chatbot:</strong> {{ chat_response }}
        </div>
        {% endif %}
    </div>
    <div class="footer">
        <a href="{{ url_for('dashboard') }}"><button class="button-secondary">Back to Dashboard</button></a>
    </div>
</div>
</body>
</html>
